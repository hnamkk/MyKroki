name: Diagram check

concurrency:
  group: diagram-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - ".diagram-pilot.yml"
      - "product/examples/pilot-repository/**"
      - ".github/workflows/diagram-check.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".diagram-pilot.yml"
      - "product/examples/pilot-repository/**"
      - ".github/workflows/diagram-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagrams:
    name: Verify generated diagrams
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Windows, X64, diagram-renderer]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Check committed SVG files
        uses: ./product/github-action
        with:
          gateway-url: ${{ vars.DIAGRAM_GATEWAY_URL }}
          api-key: ${{ secrets.DIAGRAM_API_KEY }}
          config-path: .diagram-pilot.yml
          changed-only: "true"
