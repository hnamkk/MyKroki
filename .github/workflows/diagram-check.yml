name: Diagram check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagrams:
    name: Verify generated diagrams
    runs-on: [self-hosted, Windows, X64, diagram-renderer]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Check committed SVG files
        uses: ./product/github-action
        with:
          gateway-url: ${{ vars.DIAGRAM_GATEWAY_URL }}
          api-key: ${{ secrets.DIAGRAM_API_KEY }}
          config-path: product/github-action/e2e/.diagram.yml
          changed-only: "false"
