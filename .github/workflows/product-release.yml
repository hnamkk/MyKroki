name: Product Release

on:
  push:
    tags:
      - "product-v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: product/package-lock.json
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: 25
          distribution: temurin
          cache: maven
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          version: v0.34.1
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: npm ci
        working-directory: product
      - name: Package Kroki server
        run: ./mvnw --no-transfer-progress -DskipTests package
      - name: Publish versioned Kroki and Mermaid images
        run: >-
          docker buildx bake
          --allow=fs=..
          --set '*.platform=linux/amd64,linux/arm64'
          --metadata-file /tmp/product-image-metadata.json
          --push
          kroki kroki-mermaid
        env:
          TAG: ${{ github.ref_name }}
          KROKI_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/diagram-as-code-kroki
          MERMAID_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/diagram-as-code-mermaid
          OCI_SOURCE: https://github.com/${{ github.repository }}
          OCI_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
      - name: Publish versioned Gateway image
        id: gateway
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: product
          file: product/gateway/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/diagram-as-code-gateway:${{ github.ref_name }}
      - name: Capture immutable image digests
        run: |
          echo "GATEWAY_IMAGE_DIGEST=${{ steps.gateway.outputs.digest }}" >> "$GITHUB_ENV"
          echo "KROKI_IMAGE_DIGEST=$(node -e 'const m=require("/tmp/product-image-metadata.json"); process.stdout.write(m.kroki["containerimage.digest"])')" >> "$GITHUB_ENV"
          echo "MERMAID_IMAGE_DIGEST=$(node -e 'const m=require("/tmp/product-image-metadata.json"); process.stdout.write(m["kroki-mermaid"]["containerimage.digest"])')" >> "$GITHUB_ENV"
      - name: Generate Gateway release SBOM
        uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          image: ghcr.io/${{ github.repository_owner }}/diagram-as-code-gateway:${{ github.ref_name }}
          artifact-name: diagram-gateway-release-sbom.spdx.json
          output-file: product/test-results/diagram-gateway.spdx.json
          format: spdx-json
      - name: Generate Kroki release SBOM
        uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          image: ghcr.io/${{ github.repository_owner }}/diagram-as-code-kroki:${{ github.ref_name }}
          artifact-name: diagram-kroki-release-sbom.spdx.json
          output-file: product/test-results/diagram-kroki.spdx.json
          format: spdx-json
      - name: Generate Mermaid release SBOM
        uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          image: ghcr.io/${{ github.repository_owner }}/diagram-as-code-mermaid:${{ github.ref_name }}
          artifact-name: diagram-mermaid-release-sbom.spdx.json
          output-file: product/test-results/diagram-mermaid.spdx.json
          format: spdx-json
      - name: Canonicalize release SBOM metadata
        run: |
          node product/scripts/canonicalize-spdx.mjs product/test-results/diagram-gateway.spdx.json gateway
          node product/scripts/canonicalize-spdx.mjs product/test-results/diagram-kroki.spdx.json kroki
          node product/scripts/canonicalize-spdx.mjs product/test-results/diagram-mermaid.spdx.json mermaid
      - name: Verify and prepare release artifacts
        run: npm run release:prepare
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        working-directory: product
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          product/release/${GITHUB_REF_NAME}/diagram-as-code-vscode-*.vsix
          product/release/${GITHUB_REF_NAME}/diagram-as-code-action-*.cjs
          product/release/${GITHUB_REF_NAME}/docker-compose.yml
          product/release/${GITHUB_REF_NAME}/diagram-as-code.env.example
          product/release/${GITHUB_REF_NAME}/diagram.example.yml
          product/release/${GITHUB_REF_NAME}/diagram-renderer.lock
          product/release/${GITHUB_REF_NAME}/*.spdx.json
          product/release/${GITHUB_REF_NAME}/manifest.json
          product/release/${GITHUB_REF_NAME}/SHA256SUMS
          --notes-file product/release/${GITHUB_REF_NAME}/RELEASE_NOTES.md
          --title "${GITHUB_REF_NAME}"
