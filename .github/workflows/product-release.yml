name: Product Release

on:
  push:
    tags:
      - "product-v*"

permissions:
  contents: write
  packages: write

jobs:
  artifacts:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: product/package-lock.json
      - run: npm ci
        working-directory: product
      - name: Verify and prepare release artifacts
        run: npm run release:prepare
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        working-directory: product
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          product/release/${GITHUB_REF_NAME}/diagram-as-code-vscode-*.vsix
          product/release/${GITHUB_REF_NAME}/diagram-as-code-action-*.cjs
          product/release/${GITHUB_REF_NAME}/docker-compose.yml
          product/release/${GITHUB_REF_NAME}/diagram-as-code.env.example
          product/release/${GITHUB_REF_NAME}/diagram.example.yml
          product/release/${GITHUB_REF_NAME}/manifest.json
          product/release/${GITHUB_REF_NAME}/SHA256SUMS
          --notes-file product/release/${GITHUB_REF_NAME}/RELEASE_NOTES.md
          --title "${GITHUB_REF_NAME}"

  gateway-image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/diagram-as-code-gateway
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: product
          file: product/gateway/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
