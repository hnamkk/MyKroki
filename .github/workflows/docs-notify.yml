name: Upstream Docs Notify

on:
  workflow_dispatch:

jobs:
  trigger_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Notify docs.kroki.io
        uses: peter-evans/repository-dispatch@v4.0.1
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: yuzutech/docs.kroki.io
          event-type: kroki
