name: Diagram as Code
description: Check or generate diagram artifacts through a Diagram as Code Gateway.
author: Diagram as Code
inputs:
  gateway-url:
    description: Base URL of the Diagram as Code Gateway.
    required: true
  api-key:
    description: Gateway API key. Pass this from GitHub Actions secrets.
    required: false
  auth-mode:
    description: Authentication strategy. auto prefers OIDC when oidc-audience is set, then falls back to api-key.
    required: false
    default: auto
  oidc-audience:
    description: Custom audience requested from GitHub OIDC and expected by the Gateway.
    required: false
  config-path:
    description: Repository-relative project configuration file.
    required: false
    default: .diagram.yml
  changed-only:
    description: On pull requests, check only affected diagrams unless rendering configuration changed.
    required: false
    default: "true"
  mode:
    description: Use check for read-only validation or generate to update the workspace on a trusted event.
    required: false
    default: check
  artifact-name:
    description: Workflow artifact containing rendered previews and a safe manifest.
    required: false
    default: diagram-previews
  fail-on-stale:
    description: Fail check mode when generated outputs are missing, stale, or orphaned.
    required: false
    default: "true"
outputs:
  checked-count:
    description: Number of source diagrams checked.
  stale-count:
    description: Number of missing, stale, or orphaned outputs.
  generated-count:
    description: Number of outputs written or removed in generate mode.
runs:
  using: node24
  main: dist/index.cjs
branding:
  icon: image
  color: green
