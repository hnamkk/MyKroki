name: diagram-as-code

services:
  gateway:
    image: ${GATEWAY_IMAGE:?Set GATEWAY_IMAGE in .env}
    environment:
      AUTH_MODE: required
      DEPLOYMENT_PROFILE: production
      DIAGRAM_API_KEY_RECORDS: ${DIAGRAM_API_KEY_RECORDS:-}
      GITHUB_OIDC_ENABLED: ${GITHUB_OIDC_ENABLED:-false}
      GITHUB_OIDC_ISSUER: ${GITHUB_OIDC_ISSUER:-https://token.actions.githubusercontent.com}
      GITHUB_OIDC_AUDIENCE: ${GITHUB_OIDC_AUDIENCE:-}
      GITHUB_OIDC_JWKS_URL: ${GITHUB_OIDC_JWKS_URL:-https://token.actions.githubusercontent.com/.well-known/jwks}
      GITHUB_OIDC_REPOSITORY_POLICIES: ${GITHUB_OIDC_REPOSITORY_POLICIES:-[]}
      GITHUB_OIDC_CLOCK_TOLERANCE_SECONDS: ${GITHUB_OIDC_CLOCK_TOLERANCE_SECONDS:-30}
      GITHUB_OIDC_JWKS_CACHE_MAX_AGE_MS: ${GITHUB_OIDC_JWKS_CACHE_MAX_AGE_MS:-600000}
      GITHUB_OIDC_JWKS_COOLDOWN_MS: ${GITHUB_OIDC_JWKS_COOLDOWN_MS:-30000}
      GITHUB_OIDC_JWKS_TIMEOUT_MS: ${GITHUB_OIDC_JWKS_TIMEOUT_MS:-5000}
      KROKI_BASE_URL: http://kroki:8000
      RENDERER_VERSION: kroki-0.31.1
      MAX_SOURCE_BYTES: 1048576
      MAX_OUTPUT_BYTES: ${MAX_OUTPUT_BYTES:-10485760}
      RENDER_TIMEOUT_MS: ${RENDER_TIMEOUT_MS:-15000}
      RENDER_MAX_CONCURRENT: ${RENDER_MAX_CONCURRENT:-4}
      RENDER_MAX_QUEUE: ${RENDER_MAX_QUEUE:-20}
      CACHE_MAX_ENTRIES: ${CACHE_MAX_ENTRIES:-500}
      CACHE_MAX_BYTES: ${CACHE_MAX_BYTES:-268435456}
      CACHE_MAX_ITEM_BYTES: ${CACHE_MAX_ITEM_BYTES:-5242880}
      CACHE_TTL_MS: ${CACHE_TTL_MS:-86400000}
      SANITIZER_VERSION: svg-sanitizer-1
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-10}
      METRICS_ENABLED: true
      LOG_LEVEL: info
    depends_on:
      - kroki
    ports:
      - "${GATEWAY_PORT:-9000}:9000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://localhost:9000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: ${GATEWAY_PIDS_LIMIT:-256}
    mem_limit: ${GATEWAY_MEMORY_LIMIT:-512m}
    cpus: ${GATEWAY_CPU_LIMIT:-1.0}
    networks:
      - edge
      - rendering

  kroki:
    image: ${KROKI_IMAGE:?Set KROKI_IMAGE in .env}
    environment:
      KROKI_MERMAID_HOST: mermaid
      KROKI_SAFE_MODE: secure
      KROKI_MAX_BODY_SIZE: 1mb
    depends_on:
      - mermaid
    expose:
      - "8000"
    tmpfs:
      - /tmp:exec
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: ${KROKI_PIDS_LIMIT:-256}
    mem_limit: ${KROKI_MEMORY_LIMIT:-1g}
    cpus: ${KROKI_CPU_LIMIT:-2.0}
    networks:
      - rendering

  mermaid:
    image: ${MERMAID_IMAGE:?Set MERMAID_IMAGE in .env}
    expose:
      - "8002"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=256m,exec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: ${MERMAID_PIDS_LIMIT:-256}
    mem_limit: ${MERMAID_MEMORY_LIMIT:-1g}
    cpus: ${MERMAID_CPU_LIMIT:-1.0}
    networks:
      - rendering

networks:
  edge:
  rendering:
    internal: true
