name: Diagram check

on:
  pull_request:
    paths:
      - "diagrams/**"
      - "generated/**"
      - ".diagram.yml"
      - ".diagram-renderer.lock"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  diagrams:
    runs-on: [self-hosted, diagram-renderer]
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - uses: hnamkk/MyKroki/product/github-action@product-v0.1.0
        with:
          gateway-url: ${{ vars.DIAGRAM_GATEWAY_URL }}
          auth-mode: oidc
          oidc-audience: diagram-gateway
